<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포스트 관리 | Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-body">
  <nav class="nav admin-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/admin">관리자</a>
      <div class="nav-links">
        <a href="/admin/posts/new">새 글 작성</a>
        <a href="/">블로그 보기</a>
        <button type="button" class="btn-link" id="logout-btn">로그아웃</button>
      </div>
    </div>
  </nav>
  <main class="container">
    <div class="page-header admin-page-header">
      <h1>포스트 관리</h1>
      <a href="/admin/posts/new" class="btn btn-primary">+ 새 글 작성</a>
    </div>
    <div id="content"><p class="empty">불러오는 중...</p></div>
  </main>
  <script>
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      fetch('/admin/api/logout', { method: 'POST' })
        .then(() => { location.href = '/admin/login'; });
    });

    let hasExpiringPosts = false;

    fetch('/admin/api/posts')
      .then(r => {
        if (r.status === 401) { location.href = '/admin/login'; throw new Error('unauth'); }
        return r.json();
      })
      .then(({ posts }) => {
        const el = document.getElementById('content');
        if (!posts.length) {
          el.innerHTML = '<p class="empty">작성된 포스트가 없습니다.</p>';
          return;
        }

        hasExpiringPosts = posts.some(p => p.expires_at);

        const rows = posts.map(p => {
          const date = new Date(p.created_at).toLocaleDateString('ko-KR');
          const pubBadge = p.published
            ? '<span class="badge badge-published">공개</span>'
            : '<span class="badge badge-draft">비공개</span>';

          const testBadge = p.expires_at
            ? `<span class="badge badge-test">테스트</span> <span class="expires-countdown" data-expires="${p.expires_at}"></span>`
            : '';

          return `<tr>
            <td>
              <a href="/post/${esc(p.slug)}" target="_blank">${esc(p.title)}</a>
              ${testBadge}
            </td>
            <td><span class="badge badge-${esc(p.content_type)}">${esc(p.content_type.toUpperCase())}</span></td>
            <td>${pubBadge}</td>
            <td><time>${date}</time></td>
            <td class="actions">
              <a href="/admin/posts/${p.id}/edit" class="btn btn-sm btn-secondary">수정</a>
              <button class="btn btn-sm btn-danger" onclick="deletePost(${p.id})">삭제</button>
            </td>
          </tr>`;
        }).join('');

        el.innerHTML = `<table class="admin-table">
          <thead><tr><th>제목</th><th>형식</th><th>상태</th><th>작성일</th><th>관리</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

        if (hasExpiringPosts) startCountdowns();
      })
      .catch(err => {
        if (err.message !== 'unauth') {
          document.getElementById('content').innerHTML = '<p class="empty">불러오지 못했습니다.</p>';
        }
      });

    function deletePost(id) {
      if (!confirm('정말 삭제하시겠습니까?')) return;
      fetch(`/admin/api/posts/${id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(() => location.reload())
        .catch(() => alert('삭제에 실패했습니다.'));
    }

    function startCountdowns() {
      function tick() {
        document.querySelectorAll('[data-expires]').forEach(el => {
          const diff = Math.max(0, new Date(el.dataset.expires) - Date.now());
          if (diff === 0) {
            el.textContent = '곧 삭제';
            return;
          }
          const m = Math.floor(diff / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          el.textContent = `${m}분 ${s}초 후 삭제`;
        });
      }
      tick();
      setInterval(tick, 1000);
      // 만료 시각 이후 페이지 자동 새로고침
      const nearest = Math.min(...Array.from(document.querySelectorAll('[data-expires]'))
        .map(el => new Date(el.dataset.expires) - Date.now()));
      if (nearest > 0) setTimeout(() => location.reload(), nearest + 1000);
    }
  </script>
</body>
</html>
