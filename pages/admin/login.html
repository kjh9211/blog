<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | Dev Blog</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
  <div class="login-box">
    <h1>Dev Blog</h1>
    <p class="login-sub">관리자 로그인</p>

    <a href="/admin/auth/discord" class="btn-discord">
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
      Discord로 로그인
    </a>

    <div class="login-divider"><span>또는</span></div>

    <form id="local-form" style="display:flex;flex-direction:column;gap:8px;">
      <input type="text" name="username" class="form-input" placeholder="아이디" required autocomplete="username">
      <input type="password" name="password" class="form-input" placeholder="비밀번호" required autocomplete="current-password">
      <button type="submit" class="btn btn-secondary" style="width:100%;margin-top:4px">로그인</button>
    </form>
    <p id="login-error" class="login-error"></p>
  </div>

  <script>
    document.getElementById('local-form').addEventListener('submit', async e => {
      e.preventDefault();
      const username = e.target.username.value.trim();
      const password = e.target.password.value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';

      try {
        const r = await fetch('/admin/auth/local', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || '로그인 실패'; return; }
        location.href = '/admin';
      } catch {
        errEl.textContent = '서버 오류가 발생했습니다.';
      }
    });
  </script>
</body>
</html>
